<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentify: Real-Time Sentiment Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #059669;
            --success-bg: #d1fae5;
            --error: #e11d48;
            --error-bg: #ffe4e6;
            --border: rgba(226, 232, 240, 0.8);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 100%;
            margin-top: 2vh;
            position: relative;
        }

        /* Eye-catching decorative background blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s ease-in-out infinite;
        }
        .blob-1 {
            top: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: #818cf8;
            border-radius: 50%;
        }
        .blob-2 {
            bottom: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: #38bdf8;
            border-radius: 50%;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .badge {
            display: inline-block;
            background: #e0e7ff;
            color: #4338ca;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            box-shadow: 0 2px 10px rgba(79, 70, 229, 0.1);
        }

        .header h1 {
            font-size: 3.8rem;
            margin: 0 0 5px 0;
            background: linear-gradient(to right, #4f46e5, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -0.04em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), inset 0 0 0 1px rgba(255,255,255,0.6);
            border: 1px solid var(--border);
        }

        textarea {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            box-sizing: border-box;
            resize: vertical;
            min-height: 160px;
            font-family: inherit;
            margin-bottom: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            font-weight: 500;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1), inset 0 2px 4px rgba(0,0,0,0.02);
            background: #ffffff;
        }

        textarea::placeholder {
            color: #94a3b8;
            font-weight: 600;
            font-size: 1rem;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.15rem;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px -10px rgba(79, 70, 229, 0.5);
            letter-spacing: 0.5px;
        }

        button:hover:not(:disabled) { 
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px rgba(79, 70, 229, 0.6);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled { 
            background: #cbd5e1; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        .result-box {
            margin-top: 30px;
            padding: 24px;
            border-radius: 16px;
            display: none;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box.POSITIVE { background: var(--success-bg); border: 2px solid #a7f3d0; color: var(--success); }
        .result-box.NEGATIVE { background: var(--error-bg); border: 2px solid #fecdd3; color: var(--error); }

        .result-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .result-title { font-size: 1.8rem; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        .result-stats { margin: 0; font-size: 1.05rem; color: var(--text-main); font-weight: 600;}
        .result-stats strong { font-weight: 800; }

        .spinner {
            animation: spin 1s linear infinite;
            height: 24px;
            width: 24px;
            display: none;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        .error-msg {
            color: var(--error);
            margin-top: 20px;
            text-align: center;
            font-weight: 700;
            display: none;
            background: var(--error-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #fecaca;
        }

        .watermark {
            margin-top: 50px;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .watermark span {
            color: var(--primary);
            font-weight: 800;
            background: #e0e7ff;
            padding: 4px 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="header">
            <div class="badge">AI MODEL ACTIVE</div>
            <h1>Sentify</h1>
            <p>ANALYZING THE SENTIMENT OF THE SENTENCE</p>
        </div>
        
        <div class="card">
            <textarea id="inputText" placeholder="TRY NEWS, ARTICLES, MAILS, ANYTHING TO GET THE SENTIMENT ANALYSIS..."></textarea>
            
            <button id="analyzeBtn" onclick="analyze()">
                <svg class="spinner" id="spinner" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <circle cx="12" cy="12" r="10" stroke-width="4" stroke-opacity="0.25"></circle>
                    <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span id="btnText">Execute Analysis</span>
            </button>

            <div id="errorMsg" class="error-msg"></div>

            <div id="resultBox" class="result-box">
                <div class="result-header">
                    <svg id="iconPositive" style="display:none; width:36px; height:36px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <svg id="iconNegative" style="display:none; width:36px; height:36px;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h2 id="resultTitle" class="result-title"></h2>
                </div>
                <p class="result-stats" id="resultStats"></p>
            </div>
        </div>
        
        <div style="display:flex; justify-content:center;">
            <div class="watermark">
                Engineered By <span>ANIRUDH</span>
            </div>
        </div>
    </div>

    <script>
        async function analyze() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) return;

            // DOM Elements
            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');
            const resultBox = document.getElementById('resultBox');
            const errorMsg = document.getElementById('errorMsg');
            const iconPos = document.getElementById('iconPositive');
            const iconNeg = document.getElementById('iconNegative');

            // Trigger Loading State
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Processing Neural Network...';
            resultBox.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                // Ping the API Gateway
                const response = await fetch('http://localhost:8080/api/sentiment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) throw new Error("Backend error");
                const data = await response.json();
                
                // Populate the UI with results
                resultBox.className = 'result-box ' + data.sentiment; 
                document.getElementById('resultTitle').innerText = data.sentiment;
                document.getElementById('resultStats').innerHTML = `Confidence Score: <strong>${Math.round(data.confidence * 100)}%</strong>`;
                
                // Toggle the appropriate icon
                if(data.sentiment === 'POSITIVE') {
                    iconPos.style.display = 'block';
                    iconNeg.style.display = 'none';
                } else {
                    iconPos.style.display = 'none';
                    iconNeg.style.display = 'block';
                }

                resultBox.style.display = 'block';

            } catch (error) {
                errorMsg.innerText = 'Analysis failed. Make sure your Docker containers are running.';
                errorMsg.style.display = 'block';
            } finally {
                // Reset Button State
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Execute Analysis';
            }
        }
    </script>
</body>
</html>
