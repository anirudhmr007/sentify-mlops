name: Sentify CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ML Service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sentify-ml:latest ./ml-service
          docker push ${{ secrets.DOCKER_USERNAME }}/sentify-ml:latest

      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sentify-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/sentify-backend:latest

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/sentify-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/sentify-frontend:latest