version: '3.8'
services:
  ml-service:
    build: ./ml-service
    ports:
      - "8000:8000"
      
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - ML_SERVICE_URL=http://ml-service:8000/analyze
    depends_on:
      - ml-service

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"